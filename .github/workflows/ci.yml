name: CI/CD

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * *'  # once per day at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Compute version
        id: version
        run: |
          DATE=$(date +'%Y.%m.%d')
          HASH=$(git rev-parse --short HEAD)
          echo "version=${DATE}-${HASH}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: cargo test --workspace --locked

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            archive_ext: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x86_64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        env:
          VERSION: ${{ needs.test.outputs.version }}
        run: |
          DIR="v6asm-${VERSION}-${{ matrix.platform }}"
          mkdir -p "$DIR"
          cp "target/${{ matrix.target }}/release/v6asm" "$DIR/"
          cp "target/${{ matrix.target }}/release/v6fdd" "$DIR/"
          cp -r docs "$DIR/"
          cp README.md "$DIR/"
          tar czf "${DIR}.${{ matrix.archive_ext }}" "$DIR/"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.test.outputs.version }}
        run: |
          $dir = "v6asm-${env:VERSION}-${{ matrix.platform }}"
          New-Item -ItemType Directory -Force -Path $dir
          Copy-Item "target\${{ matrix.target }}\release\v6asm.exe" "$dir\"
          Copy-Item "target\${{ matrix.target }}\release\v6fdd.exe" "$dir\"
          Copy-Item -Recurse "docs" "$dir\"
          Copy-Item "README.md" "$dir\"
          Compress-Archive -Path $dir -DestinationPath "${dir}.${{ matrix.archive_ext }}"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.test.outputs.version }}-${{ matrix.platform }}
          path: v6asm-${{ needs.test.outputs.version }}-${{ matrix.platform }}.${{ matrix.archive_ext }}

  release:
    name: Create Release
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.test.outputs.version }}
        run: |
          TAG="v${VERSION}"
          # Create the release if it does not exist yet, then upload/overwrite assets
          gh release view "${TAG}" 2>/dev/null || gh release create "${TAG}" \
            --title "Release ${VERSION}" \
            --notes "**Build:** \`${VERSION}\`"
          gh release upload "${TAG}" artifacts/* --clobber
